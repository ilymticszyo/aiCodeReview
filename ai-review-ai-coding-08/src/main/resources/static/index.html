<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代码审查-系统大盘</title>
    <!-- 主题初始化：在页面渲染前设置，避免闪烁 -->
    <script>
        (function () {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
        })();
        tailwind = { config: { darkMode: 'class' } };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' };</script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        /* 自定义滚动条 - 亮色模式 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        /* 自定义滚动条 - 暗色模式 */
        .dark ::-webkit-scrollbar-track { background: #1f2937; }
        .dark ::-webkit-scrollbar-thumb { background: #4b5563; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #6b7280; }

        /* 标签页样式由 CSS 统一管理 */
        .tab-button { color: #6b7280; }
        .dark .tab-button { color: #9ca3af; }
        .tab-button.active {
            border-bottom: 2px solid #2563eb;
            color: #2563eb;
        }
        .dark .tab-button.active {
            border-bottom-color: #60a5fa;
            color: #60a5fa;
        }

        /* 主题按钮旋转动画 */
        #themeToggle { transition: transform 0.3s ease; }
        #themeToggle:hover { transform: rotate(20deg); }

        /* 暗色模式日期选择器图标反色 */
        .dark input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }

        /* 平滑过渡 */
        body, .card-transition { transition: background-color 0.3s ease, color 0.3s ease; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen">

    <!-- 头部导航 -->
    <nav class="bg-gradient-to-r from-blue-600 to-purple-600 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <h1 class="text-2xl font-bold">&#128202; 代码审查-系统大盘</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="lastUpdate" class="text-sm text-blue-100"></span>
                    <!-- 主题切换按钮 -->
                    <button id="themeToggle" onclick="toggleTheme()"
                        class="p-2 rounded-full bg-white/20 hover:bg-white/30 focus:outline-none focus:ring-2 focus:ring-white/50 transition-colors"
                        title="切换亮色/暗色主题">
                        <!-- 太阳图标（暗色模式时显示，点击切换为亮色） -->
                        <svg id="iconSun" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
                        </svg>
                        <!-- 月亮图标（亮色模式时显示，点击切换为暗色） -->
                        <svg id="iconMoon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主要内容 -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <!-- 筛选器 -->
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-md p-6 mb-6 card-transition">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">开始日期</label>
                    <input type="date" id="startDate"
                        class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-400 transition-colors">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">结束日期</label>
                    <input type="date" id="endDate"
                        class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-400 transition-colors">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">用户名</label>
                    <select id="authors"
                        class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-400 text-sm transition-colors">
                        <option value="">全部</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">项目名</label>
                    <select id="projectNames"
                        class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-400 text-sm transition-colors">
                        <option value="">全部</option>
                    </select>
                </div>
            </div>
            <div class="mt-4 flex items-center space-x-4">
                <button onclick="loadData()"
                    class="px-6 py-2 bg-blue-600 hover:bg-blue-700 dark:bg-blue-500 dark:hover:bg-blue-600 text-white rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors">
                    查询
                </button>
                <button onclick="resetFilters()"
                    class="px-6 py-2 bg-gray-500 hover:bg-gray-600 dark:bg-gray-600 dark:hover:bg-gray-500 text-white rounded-md focus:outline-none focus:ring-2 focus:ring-gray-500 transition-colors">
                    重置
                </button>
                <div class="flex items-center space-x-2">
                    <input type="radio" id="typeMr" name="reviewType" value="mr" checked
                        class="text-blue-600 focus:ring-blue-500 dark:focus:ring-blue-400">
                    <label for="typeMr" class="text-sm font-medium text-gray-700 dark:text-gray-300">Merge Request</label>
                    <input type="radio" id="typePush" name="reviewType" value="push"
                        class="ml-4 text-blue-600 focus:ring-blue-500 dark:focus:ring-blue-400">
                    <label for="typePush" class="text-sm font-medium text-gray-700 dark:text-gray-300">Push</label>
                </div>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <div class="bg-gradient-to-r from-blue-500 to-blue-600 rounded-lg shadow-lg p-6 text-white">
                <h3 class="text-lg font-semibold mb-2">总记录数</h3>
                <p class="text-4xl font-bold" id="totalRecords">0</p>
            </div>
            <div class="bg-gradient-to-r from-purple-500 to-purple-600 rounded-lg shadow-lg p-6 text-white">
                <h3 class="text-lg font-semibold mb-2">平均分数</h3>
                <p class="text-4xl font-bold" id="averageScore">0.00</p>
            </div>
        </div>

        <!-- 标签页 -->
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-md mb-6 card-transition">
            <div class="border-b border-gray-200 dark:border-gray-700">
                <nav class="flex -mb-px">
                    <button onclick="switchTab('data')" id="tabData"
                        class="tab-button active px-6 py-4 text-sm font-medium border-b-2 transition-colors">
                        数据表格
                    </button>
                    <button onclick="switchTab('charts')" id="tabCharts"
                        class="tab-button px-6 py-4 text-sm font-medium hover:border-gray-300 transition-colors">
                        统计图表
                    </button>
                </nav>
            </div>

            <!-- 数据表格标签页 -->
            <div id="tabContentData" class="tab-content p-6">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
                        <thead class="bg-gray-50 dark:bg-gray-700">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">项目名</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">作者</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider" id="branchHeader">源分支</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider" id="targetBranchHeader">目标分支</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">更新时间</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">提交信息</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">代码变更</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">分数</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider" id="urlHeader">链接</th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody" class="bg-white dark:bg-gray-800 divide-y divide-gray-200 dark:divide-gray-700">
                            <tr>
                                <td colspan="9" class="px-6 py-4 text-center text-gray-500 dark:text-gray-400">加载中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 图表标签页 -->
            <div id="tabContentCharts" class="tab-content hidden p-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-4 card-transition">
                        <h3 class="text-lg font-semibold mb-4 text-center text-gray-800 dark:text-gray-100">项目提交次数</h3>
                        <canvas id="projectCountChart"></canvas>
                    </div>
                    <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-4 card-transition">
                        <h3 class="text-lg font-semibold mb-4 text-center text-gray-800 dark:text-gray-100">项目平均分数</h3>
                        <canvas id="projectScoreChart"></canvas>
                    </div>
                    <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-4 card-transition">
                        <h3 class="text-lg font-semibold mb-4 text-center text-gray-800 dark:text-gray-100">人员提交次数</h3>
                        <canvas id="authorCountChart"></canvas>
                    </div>
                    <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-4 card-transition">
                        <h3 class="text-lg font-semibold mb-4 text-center text-gray-800 dark:text-gray-100">人员平均分数</h3>
                        <canvas id="authorScoreChart"></canvas>
                    </div>
                    <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-4 md:col-span-2 card-transition">
                        <h3 class="text-lg font-semibold mb-4 text-center text-gray-800 dark:text-gray-100">人员代码变更总行数</h3>
                        <canvas id="authorCodeLineChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/app.js"></script>
    <script>
        // 主题切换
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon(isDark);
            // 如果当前在图表标签页，重新渲染以应用主题色
            if (!document.getElementById('tabContentCharts').classList.contains('hidden')) {
                loadCharts();
            }
        }

        function updateThemeIcon(isDark) {
            document.getElementById('iconSun').classList.toggle('hidden', !isDark);
            document.getElementById('iconMoon').classList.toggle('hidden', isDark);
        }

        // 初始化图标状态
        updateThemeIcon(document.documentElement.classList.contains('dark'));
    </script>
</body>
</html>
